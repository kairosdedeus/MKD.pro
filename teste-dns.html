<!DOCTYPE html>
<html>

<head>
    <title>Teste de Conexão Supabase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .test {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .success {
            background: #d4edda;
            border-color: #c3e6cb;
        }

        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            border-color: #bee5eb;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <h1>🔍 Teste de Conexão Supabase</h1>

    <div class="test info">
        <h3>Informações do Projeto</h3>
        <p><strong>URL:</strong> https://ewuvrinbvhjislkrohwh.supabase.co</p>
        <p><strong>ID:</strong> ewuvrinbvhjislkrohwh</p>
    </div>

    <button onclick="testarConexao()">🚀 Testar Conexão</button>

    <div id="resultados"></div>

    <script>
        async function testarConexao() {
            const resultados = document.getElementById('resultados');
            resultados.innerHTML = '<div class="test info">Testando...</div>';

            const testes = [];

            // Teste 1: Fetch direto
            try {
                const response = await fetch('https://ewuvrinbvhjislkrohwh.supabase.co/rest/v1/', {
                    method: 'GET',
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dXZyaW5kdmhqaXNsa3JvaHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTY1MzksImV4cCI6MjA5MzA3MjUzOX0.uVJYeFluasgxlJvSTmKef_YkLEPQNKY3ix5aKJb0jtU'
                    }
                });

                testes.push({
                    nome: 'Fetch Direto',
                    sucesso: true,
                    mensagem: `Status: ${response.status} - Conexão estabelecida!`,
                    detalhes: `URL acessível`
                });
            } catch (error) {
                testes.push({
                    nome: 'Fetch Direto',
                    sucesso: false,
                    mensagem: error.message,
                    detalhes: error.toString()
                });
            }

            // Teste 2: Verificar CORS
            try {
                const response = await fetch('https://ewuvrinbvhjislkrohwh.supabase.co/rest/v1/profiles?select=count&limit=1', {
                    method: 'GET',
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dXZyaW5kdmhqaXNsa3JvaHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTY1MzksImV4cCI6MjA5MzA3MjUzOX0.uVJYeFluasgxlJvSTmKef_YkLEPQNKY3ix5aKJb0jtU',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dXZyaW5kdmhqaXNsa3JvaHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTY1MzksImV4cCI6MjA5MzA3MjUzOX0.uVJYeFluasgxlJvSTmKef_YkLEPQNKY3ix5aKJb0jtU'
                    }
                });

                const data = await response.json();

                testes.push({
                    nome: 'Acesso à Tabela Profiles',
                    sucesso: response.ok,
                    mensagem: response.ok ? 'Tabela acessível!' : `Erro: ${response.status}`,
                    detalhes: JSON.stringify(data, null, 2)
                });
            } catch (error) {
                testes.push({
                    nome: 'Acesso à Tabela Profiles',
                    sucesso: false,
                    mensagem: error.message,
                    detalhes: error.toString()
                });
            }

            // Teste 3: DNS Resolution
            try {
                const img = new Image();
                img.src = 'https://ewuvrinbvhjislkrohwh.supabase.co/favicon.ico?' + Date.now();

                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    setTimeout(reject, 5000);
                });

                testes.push({
                    nome: 'Resolução DNS',
                    sucesso: true,
                    mensagem: 'DNS resolvendo corretamente',
                    detalhes: 'Servidor acessível'
                });
            } catch (error) {
                testes.push({
                    nome: 'Resolução DNS',
                    sucesso: false,
                    mensagem: 'DNS não está resolvendo',
                    detalhes: 'Possível problema de rede ou firewall'
                });
            }

            // Renderizar resultados
            let html = '';
            testes.forEach(teste => {
                const classe = teste.sucesso ? 'success' : 'error';
                html += `
                    <div class="test ${classe}">
                        <h3>${teste.sucesso ? '✅' : '❌'} ${teste.nome}</h3>
                        <p><strong>Mensagem:</strong> ${teste.mensagem}</p>
                        <details>
                            <summary>Ver detalhes</summary>
                            <pre>${teste.detalhes}</pre>
                        </details>
                    </div>
                `;
            });

            // Diagnóstico
            const todosErros = testes.every(t => !t.sucesso);
            const algunsErros = testes.some(t => !t.sucesso);

            if (todosErros) {
                html += `
                    <div class="test error">
                        <h3>🔴 Diagnóstico: Problema de Rede</h3>
                        <p>Nenhum teste passou. Possíveis causas:</p>
                        <ul>
                            <li>Firewall bloqueando conexões</li>
                            <li>Antivírus bloqueando</li>
                            <li>Problema de DNS local</li>
                            <li>VPN interferindo</li>
                            <li>Proxy corporativo</li>
                        </ul>
                        <p><strong>Soluções:</strong></p>
                        <ol>
                            <li>Desative temporariamente firewall/antivírus</li>
                            <li>Desative VPN se estiver usando</li>
                            <li>Troque DNS para 8.8.8.8 (Google)</li>
                            <li>Teste em outra rede (celular)</li>
                            <li>Teste em modo anônimo do navegador</li>
                        </ol>
                    </div>
                `;
            } else if (algunsErros) {
                html += `
                    <div class="test info">
                        <h3>⚠️ Diagnóstico: Conexão Parcial</h3>
                        <p>Alguns testes falharam. Verifique:</p>
                        <ul>
                            <li>Configuração de CORS no Supabase</li>
                            <li>Políticas RLS nas tabelas</li>
                            <li>Chave de API correta</li>
                        </ul>
                    </div>
                `;
            } else {
                html += `
                    <div class="test success">
                        <h3>🎉 Diagnóstico: Tudo Funcionando!</h3>
                        <p>Todos os testes passaram. A conexão com o Supabase está OK!</p>
                        <p>Se ainda tiver problemas no app, verifique:</p>
                        <ul>
                            <li>Arquivo .env está na raiz do projeto</li>
                            <li>Servidor foi reiniciado após criar .env</li>
                            <li>Variáveis começam com VITE_</li>
                        </ul>
                    </div>
                `;
            }

            resultados.innerHTML = html;
        }

        // Executar automaticamente
        window.onload = () => {
            setTimeout(testarConexao, 1000);
        };
    </script>
</body>

</html>
